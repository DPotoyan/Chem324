version: 1
project:
  title: Quantum Mechanics for Chemistry
  description: Lecture notes for Chem 3240 — Quantum Mechanics for Chemistry.
  authors:
    - name: Davit Potoyan
  github: https://github.com/DPotoyan/Chem324
  # Math macros available in every page
  math:
    '\bra': '\left\langle #1 \right|'
    '\ket': '\left| #1 \right\rangle'
    '\braket': '\left\langle #1 \right\rangle'
