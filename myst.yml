version: 1
project:
  title: Quantum Mechanics for Chemistry
  description: Lecture notes for Chem 3240 — Quantum Mechanics for Chemistry.
  authors:
    - name: Davit Potoyan
  github: https://github.com/DPotoyan/Chem324
  # Math macros available in every page
  math:
    '\bra': '\left\langle #1 \right|'
    '\ket': '\left| #1 \right\rangle'
    '\braket': '\left\langle #1 \right\rangle'
  # Auto-number figures (and equations) so they can be cross-referenced
  numbering:
    figure: true
    equation: true
  toc:
    - file: index.md
    - title: "Chapter 1: Intro to Quantum Mechanics"
      children:
        - file: ch01/00-index.md
        - file: ch01/01-why-quantum-mechanics.md
        - file: ch01/02-the-need-for-quantization.md
        - file: ch01/03-photoelectric-effect.md
        - file: ch01/04-atomic-spectra.md
        - file: ch01/05-wave-particle-duality.md
        - file: ch01/06-demo-bohr.ipynb
site:
  template: book-theme
  options:
    hide_toc: false
    logo: assets/isu-logo.png
    logo_text: "Chem 3240 · Quantum Mechanics"
    style: custom.css
