version: 1
project:
  title: Quantum Mechanics for Chemistry
  description: Lecture notes for Chem 3240, Quantum Mechanics for Chemistry.
  authors:
    - name: Davit Potoyan
  github: https://github.com/DPotoyan/Chem324
  bibliography:
    - references.bib
  # marimo pilot: renders {marimo} directives as reactive in-browser islands
  plugins:
    - type: executable
      path: .venv/bin/jupyter-book-marimo
  # Math macros available in every page
  math:
    '\bra': '\left\langle #1 \right|'
    '\ket': '\left| #1 \right\rangle'
    '\braket': '\left\langle #1 \right\rangle'
  # Auto-number figures (and equations) so they can be cross-referenced
  numbering:
    figure: true
    equation: true
  toc:
