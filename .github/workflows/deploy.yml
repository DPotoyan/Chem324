name: deploy-mystmd

# Build the MyST site and publish it to the gh-pages branch on every push to master.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write   # peaceiris pushes the built HTML to the gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install MyST
        run: npm install -g mystmd

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install marimo plugin
        # myst.yml registers an executable plugin at .venv/bin/jupyter-book-marimo;
        # it renders {marimo} directives and shells out to uv to execute the cells
        # at build time (deps come from each page's pyproject block).
        run: |
          pip install uv
          uv venv .venv --python 3.13
          uv pip install --python .venv/bin/python jupyter-book-marimo

      - name: Install Python deps for cell execution
        # Kernel environment for `--execute`: lecture {code-cell} blocks and demo
        # notebooks run at build time so the site shows their outputs. Notebooks
        # that cannot run headless carry `execute: skip: true` frontmatter.
        run: pip install -r requirements.txt

      - name: Build HTML
        env:
          # Served at https://dpotoyan.github.io/Chem324/ -> assets need the /Chem324 prefix.
          BASE_URL: /Chem324
        run: myst build --html --execute

      - name: Cache rendered slide decks
        # Decks are ~200 MB rendered, so they are never committed; instead the
        # rendered htmls are cached keyed on the deck sources. Only an edit to
        # a .qmd or the theme triggers a re-render.
        id: slides-cache
        uses: actions/cache@v4
        with:
          path: slides/**/*.html
          key: slides-html-${{ hashFiles('slides/**/*.qmd', 'slides/theme.scss') }}

      - name: Set up Quarto
        if: steps.slides-cache.outputs.cache-hit != 'true'
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render lecture slide decks
        if: steps.slides-cache.outputs.cache-hit != 'true'
        run: |
          for f in slides/ch0*/*.qmd; do
            quarto render "$f" --to revealjs --quiet
          done

      - name: Copy slide decks into site
        # One self-contained reveal.js html per lecture, served under /slides/.
        run: |
          for d in slides/ch0*; do
            mkdir -p "_build/html/$d"
            cp "$d"/*.html "_build/html/$d/" 2>/dev/null || true
          done

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build/html
