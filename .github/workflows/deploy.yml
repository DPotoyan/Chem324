name: deploy-mystmd

# Build the MyST site and publish it to the gh-pages branch on every push to master.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write   # peaceiris pushes the built HTML to the gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install MyST
        run: npm install -g mystmd

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Cache page execution results
        # myst's execute/transform caches are content-hashed per page: restoring
        # the previous run's cache means only changed pages re-execute (pyscf,
        # marimo sandboxes, plots). A requirements.txt change invalidates all.
        uses: actions/cache@v4
        with:
          path: |
            _build/execute
            _build/cache
          key: myst-build-${{ hashFiles('requirements.txt') }}-${{ github.sha }}
          restore-keys: |
            myst-build-${{ hashFiles('requirements.txt') }}-

      - name: Cache uv packages
        # marimo pages resolve their pyproject deps through uv at build time
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ github.sha }}
          restore-keys: |
            uv-

      - name: Install marimo plugin
        # myst.yml registers an executable plugin at .venv/bin/jupyter-book-marimo;
        # it renders {marimo} directives and shells out to uv to execute the cells
        # at build time (deps come from each page's pyproject block).
        run: |
          pip install uv
          uv venv .venv --python 3.13
          uv pip install --python .venv/bin/python jupyter-book-marimo

      - name: Install Python deps for cell execution
        # Kernel environment for `--execute`: lecture {code-cell} blocks and demo
        # notebooks run at build time so the site shows their outputs. Notebooks
        # that cannot run headless carry `execute: skip: true` frontmatter.
        run: pip install -r requirements.txt

      - name: Build HTML
        env:
          # Served at https://dpotoyan.github.io/Chem324/ -> assets need the /Chem324 prefix.
          BASE_URL: /Chem324
        run: myst build --html --execute

      - name: Cache rendered slide decks
        # Rendered decks are never committed; the html + sidecar *_files dirs
        # (reveal.js, chalkboard, menu, ojs runtime) are cached keyed on the
        # deck sources. Only an edit to a .qmd or the theme triggers a re-render.
        id: slides-cache
        uses: actions/cache@v4
        with:
          path: |
            slides/**/*.html
            slides/**/*_files
          key: slides-html-${{ hashFiles('slides/**/*.qmd', 'slides/theme.scss') }}

      - name: Set up Quarto
        if: steps.slides-cache.outputs.cache-hit != 'true'
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render lecture slide decks
        if: steps.slides-cache.outputs.cache-hit != 'true'
        run: |
          for f in slides/ch0*/*.qmd; do
            quarto render "$f" --to revealjs --quiet
          done

      - name: Copy slide decks into site
        # Web-first reveal.js decks under /slides/: each html needs its *_files
        # sidecar, and slide images resolve relatively to ../../chNN/images, so
        # the chapter image dirs must also exist in the published site.
        run: |
          for d in slides/ch0*; do
            mkdir -p "_build/html/$d"
            cp -r "$d"/*.html "$d"/*_files "_build/html/$d/" 2>/dev/null || true
          done
          for d in ch0*/images; do
            mkdir -p "_build/html/$d"
            cp -r "$d"/. "_build/html/$d/"
          done

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build/html
